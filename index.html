<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="description" content="Trénuj anglická slovíčka kdekoliv, i offline." />
  <title>Slovíčka</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #181c27;
      --surface2:  #1f2438;
      --border:    #2a3050;
      --accent:    #5b8df6;
      --accent2:   #a78bfa;
      --green:     #34d399;
      --red:       #f87171;
      --text:      #e8ecf4;
      --muted:     #6b7799;
      --radius:    16px;
      --font-main: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      position: relative;
      overflow-x: hidden;
    }

    /* ── Background noise texture ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(15,17,23,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .word-count {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--surface2);
      padding: 4px 10px;
      border-radius: 100px;
      border: 1px solid var(--border);
    }

    /* ── Tab nav ── */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      padding: 16px 16px 0;
      position: sticky;
      top: 61px;
      z-index: 9;
      background: var(--bg);
    }

    .tab-btn {
      font-family: var(--font-main);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 6px;
      cursor: pointer;
      transition: all 0.18s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .tab-btn .icon { font-size: 1.1rem; }

    .tab-btn.active {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent) inset, 0 4px 20px rgba(91,141,246,0.12);
    }

    /* ── Panels ── */
    .panel {
      display: none;
      padding: 20px 16px 100px;
      flex: 1;
      animation: fadeUp 0.25s ease both;
    }

    .panel.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Section label ── */
    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 12px;
    }

    /* ── Form ── */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }

    label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-main);
      font-size: 1rem;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91,141,246,0.15);
    }

    input[type="text"]::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      font-family: var(--font-main);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      border: none;
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: transform 0.12s, opacity 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 20px rgba(91,141,246,0.3);
    }

    .btn-primary:hover { opacity: 0.9; box-shadow: 0 6px 28px rgba(91,141,246,0.4); }

    .btn-green {
      background: linear-gradient(135deg, #059669, var(--green));
      color: #fff;
      box-shadow: 0 4px 18px rgba(52,211,153,0.25);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
      padding: 8px 14px;
      width: auto;
      border-radius: 8px;
    }

    .btn-speak {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent2);
      font-size: 0.85rem;
      padding: 10px;
      border-radius: 10px;
      width: auto;
      flex: 0;
    }

    /* ── Word list ── */
    .word-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 8px;
      animation: fadeUp 0.2s ease both;
    }

    .word-item:hover { border-color: var(--border); background: var(--surface2); }

    .word-pair {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .word-en {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
    }

    .word-cs {
      font-size: 0.82rem;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 6px;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .delete-btn:hover { color: var(--red); background: rgba(248,113,113,0.1); }

    /* ── Quiz panel ── */
    .quiz-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 24px 28px;
      text-align: center;
      margin-bottom: 14px;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .quiz-card::before {
      content: '';
      position: absolute;
      top: -40px; left: -40px;
      width: 140px; height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(91,141,246,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .quiz-badge {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(91,141,246,0.1);
      border: 1px solid rgba(91,141,246,0.25);
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 20px;
    }

    .quiz-word {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .quiz-hint {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 10px;
    }

    .quiz-answer {
      margin-top: 16px;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--green);
      animation: reveal 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes reveal {
      from { opacity: 0; transform: scale(0.85) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .quiz-speak-row {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      margin-top: 8px;
    }

    .score-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .score-item {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .score-num {
      font-size: 1.6rem;
      font-weight: 800;
      font-family: var(--font-mono);
    }

    .score-num.green { color: var(--green); }
    .score-num.red   { color: var(--red); }

    .score-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-top: 2px;
      font-weight: 600;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    .btn-row .btn { flex: 1; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }

    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-title { font-weight: 700; font-size: 1rem; color: var(--text); margin-bottom: 6px; }
    .empty-sub { font-size: 0.83rem; line-height: 1.5; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 100px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Search bar ── */
    .search-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .search-wrap input {
      padding-left: 38px;
    }

    .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.95rem;
      pointer-events: none;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 100px; }
  </style>
</head>
<body>

<header>
  <div class="logo">📖 Slovíčka</div>
  <div class="word-count" id="word-count">0 slovíček</div>
</header>

<div class="tabs" role="tablist">
  <button class="tab-btn active" onclick="showPanel('add')" role="tab">
    <span class="icon">➕</span> Přidat
  </button>
  <button class="tab-btn" onclick="showPanel('list')" role="tab">
    <span class="icon">📋</span> Seznam
  </button>
  <button class="tab-btn" onclick="showPanel('quiz')" role="tab">
    <span class="icon">🎯</span> Zkoušení
  </button>
</div>

<!-- ═══════════════════════════════ PANEL: ADD ═════════════════════════════ -->
<div class="panel active" id="panel-add">
  <div class="card">
    <p class="section-label">Nové slovíčko</p>
    <div class="field-group">
      <div>
        <label for="input-en">🇬🇧 Anglicky</label>
        <input type="text" id="input-en" placeholder="např. ambiguous" autocomplete="off" />
      </div>
      <div>
        <label for="input-cs">🇨🇿 Česky</label>
        <input type="text" id="input-cs" placeholder="např. nejednoznačný" autocomplete="off" />
      </div>
    </div>
    <button class="btn btn-primary" onclick="addWord()">
      <span>➕</span> Uložit slovíčko
    </button>
  </div>

  <div class="card" style="margin-top:8px;">
    <p class="section-label">Tipy</p>
    <p style="font-size:0.82rem;color:var(--muted);line-height:1.6;">
      Aplikace ukládá vše lokálně do tvého zařízení — žádný server, žádné přihlašování.
      Funguje i offline po instalaci na plochu. 🚀
    </p>
  </div>
</div>

<!-- ════════════════════════════════ PANEL: LIST ══════════════════════════ -->
<div class="panel" id="panel-list">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Hledat slovíčko…" oninput="renderList()" />
  </div>
  <p class="section-label" id="list-label">Všechna slovíčka</p>
  <div id="word-list"></div>
</div>

<!-- ════════════════════════════════ PANEL: QUIZ ══════════════════════════ -->
<div class="panel" id="panel-quiz">

  <div class="score-bar">
    <div class="score-item">
      <div class="score-num green" id="score-correct">0</div>
      <div class="score-label">Správně</div>
    </div>
    <div class="score-item">
      <div class="score-num red" id="score-wrong">0</div>
      <div class="score-label">Špatně</div>
    </div>
    <div class="score-item">
      <div class="score-num" id="score-streak" style="color:var(--accent2)">0</div>
      <div class="score-label">Série</div>
    </div>
  </div>

  <div class="quiz-card" id="quiz-card">
    <div class="empty-state" style="padding:0">
      <div class="empty-icon">🎯</div>
      <div class="empty-title">Připraven na zkoušení?</div>
      <div class="empty-sub">Klikni na „Nové slovo" níže<br>a začni trénovat.</div>
    </div>
  </div>

  <div class="btn-row" style="margin-bottom:10px;">
    <button class="btn btn-primary" onclick="nextWord()">
      <span>🔀</span> Nové slovo
    </button>
    <button class="btn btn-outline" onclick="revealAnswer()" id="btn-reveal">
      Zobrazit
    </button>
  </div>

  <div class="btn-row" id="quiz-feedback" style="display:none;">
    <button class="btn" onclick="markResult(true)"
      style="background:rgba(52,211,153,0.15);border:1px solid var(--green);color:var(--green);font-weight:700;">
      ✅ Uměl jsem
    </button>
    <button class="btn" onclick="markResult(false)"
      style="background:rgba(248,113,113,0.1);border:1px solid var(--red);color:var(--red);font-weight:700;">
      ❌ Neuměl jsem
    </button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
//  DATABASE  (Dexie.js)
// ══════════════════════════════════════════════════════════════
const db = new Dexie('SlovickaDB');
db.version(1).stores({ words: '++id, en, cs, createdAt' });

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let allWords   = [];
let quizWord   = null;
let revealed   = false;
let scoreCorrect = 0, scoreWrong = 0, streak = 0;

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
async function init() {
  allWords = await db.words.toArray();
  updateCount();
  renderList();
}
init();

// ══════════════════════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════════════════════
function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  const idx = { add: 0, list: 1, quiz: 2 }[name];
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  if (name === 'list') renderList();
}

// ══════════════════════════════════════════════════════════════
//  ADD WORD
// ══════════════════════════════════════════════════════════════
async function addWord() {
  const en = document.getElementById('input-en').value.trim();
  const cs = document.getElementById('input-cs').value.trim();
  if (!en || !cs) { toast('⚠️ Vyplň obě pole!'); return; }

  await db.words.add({ en, cs, createdAt: Date.now() });
  allWords = await db.words.toArray();
  updateCount();

  document.getElementById('input-en').value = '';
  document.getElementById('input-cs').value = '';
  document.getElementById('input-en').focus();
  toast('✅ Slovíčko přidáno!');
}

// Enter to submit
document.getElementById('input-cs').addEventListener('keydown', e => {
  if (e.key === 'Enter') addWord();
});

// ══════════════════════════════════════════════════════════════
//  LIST
// ══════════════════════════════════════════════════════════════
function renderList() {
  const q   = (document.getElementById('search-input')?.value || '').toLowerCase();
  const filtered = allWords
    .filter(w => w.en.toLowerCase().includes(q) || w.cs.toLowerCase().includes(q))
    .sort((a, b) => b.createdAt - a.createdAt);

  const label = document.getElementById('list-label');
  label.textContent = q
    ? `Výsledky (${filtered.length})`
    : `Všechna slovíčka (${allWords.length})`;

  const container = document.getElementById('word-list');
  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${q ? '🔍' : '📭'}</div>
        <div class="empty-title">${q ? 'Nic nenalezeno' : 'Žádná slovíčka'}</div>
        <div class="empty-sub">${q ? 'Zkus jiný výraz.' : 'Přidej první slovíčko na záložce Přidat.'}</div>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(w => `
    <div class="word-item" id="item-${w.id}">
      <div class="word-pair">
        <div class="word-en">${escHtml(w.en)}</div>
        <div class="word-cs">${escHtml(w.cs)}</div>
      </div>
      <button class="btn btn-speak" onclick="speak('${escHtml(w.en)}')" title="Výslovnost">🔊</button>
      <button class="delete-btn" onclick="deleteWord(${w.id})" title="Smazat">🗑</button>
    </div>`).join('');
}

async function deleteWord(id) {
  await db.words.delete(id);
  allWords = await db.words.toArray();
  updateCount();
  renderList();
  toast('🗑 Smazáno');
}

// ══════════════════════════════════════════════════════════════
//  QUIZ
// ══════════════════════════════════════════════════════════════
function nextWord() {
  if (allWords.length === 0) {
    toast('⚠️ Nejdřív přidej nějaká slovíčka!');
    return;
  }

  const pool = allWords.length > 1 && quizWord
    ? allWords.filter(w => w.id !== quizWord.id)
    : allWords;

  quizWord = pool[Math.floor(Math.random() * pool.length)];
  revealed = false;

  document.getElementById('quiz-feedback').style.display = 'none';
  document.getElementById('btn-reveal').disabled = false;

  document.getElementById('quiz-card').innerHTML = `
    <div class="quiz-badge">🇬🇧 Anglicky</div>
    <div class="quiz-word">${escHtml(quizWord.en)}</div>
    <div class="quiz-hint">Jak se řekne česky?</div>
  `;
}

function revealAnswer() {
  if (!quizWord || revealed) return;
  revealed = true;
  document.getElementById('btn-reveal').disabled = true;

  const card = document.getElementById('quiz-card');
  const answerDiv = document.createElement('div');
  answerDiv.className = 'quiz-answer';
  answerDiv.innerHTML = escHtml(quizWord.cs);

  const speakRow = document.createElement('div');
  speakRow.className = 'quiz-speak-row';
  speakRow.innerHTML = `
    <button class="btn btn-speak" onclick="speak('${escHtml(quizWord.en)}')" style="margin-top:0">
      🔊 Výslovnost
    </button>`;

  card.appendChild(answerDiv);
  card.appendChild(speakRow);
  document.getElementById('quiz-feedback').style.display = 'flex';
}

function markResult(correct) {
  if (correct) {
    scoreCorrect++;
    streak++;
    toast('✅ Perfektní! Série: ' + streak);
  } else {
    scoreWrong++;
    streak = 0;
    toast('❌ Příště lépe!');
  }
  document.getElementById('score-correct').textContent = scoreCorrect;
  document.getElementById('score-wrong').textContent   = scoreWrong;
  document.getElementById('score-streak').textContent  = streak;
  nextWord();
}

// ══════════════════════════════════════════════════════════════
//  SPEECH
// ══════════════════════════════════════════════════════════════
function speak(text) {
  if (!('speechSynthesis' in window)) { toast('⚠️ Prohlížeč nepodporuje TTS'); return; }
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = 0.9;
  speechSynthesis.speak(utt);
}

// ══════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════
function updateCount() {
  const n = allWords.length;
  document.getElementById('word-count').textContent =
    n === 0 ? '0 slovíček' :
    n === 1 ? '1 slovíčko' :
    n < 5   ? `${n} slovíčka` : `${n} slovíček`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ══════════════════════════════════════════════════════════════
//  SERVICE WORKER registration
// ══════════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () =>
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('✅ SW registered'))
      .catch(err => console.warn('SW error:', err))
  );
}
</script>
